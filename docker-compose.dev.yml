# Dev stack: Postgres + Qdrant + unified API (frontend runs via npm locally)
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: spotify
      POSTGRES_PASSWORD: spotify
      POSTGRES_DB: spotify_nl
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_dev:/qdrant/storage

volumes:
  pgdata_dev:
  qdrant_dev:
