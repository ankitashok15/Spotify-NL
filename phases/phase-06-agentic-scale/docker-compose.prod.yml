services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: spotify
      POSTGRES_PASSWORD: spotify
      POSTGRES_DB: spotify_nl
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  api:
    build:
      context: ../..
      dockerfile: config/deployment/api.Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8004:8004"
    depends_on:
      - postgres
      - redis
      - qdrant

  api_replica:
    build:
      context: ../..
      dockerfile: config/deployment/api.Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8005:8004"
    depends_on:
      - postgres
      - redis
      - qdrant

  worker:
    build:
      context: ../..
      dockerfile: config/deployment/worker.Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - redis
      - postgres
      - qdrant
    deploy:
      replicas: 2

  beat:
    build:
      context: ../..
      dockerfile: config/deployment/worker.Dockerfile
    command: celery -A phase06.orchestration.celery_app:celery_app beat --loglevel=INFO
    env_file:
      - ../../.env
    depends_on:
      - redis

volumes:
  pgdata:
  qdrantdata:
